name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save x86 archive
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} --platform linux/amd64
          docker save ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} | gzip > /tmp/vid-fetch-hub-v${{ steps.version.outputs.version }}-x86.tar.gz

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: vid-fetch-hub-v${{ steps.version.outputs.version }}-x86.tar.gz
          path: /tmp/vid-fetch-hub-v${{ steps.version.outputs.version }}-x86.tar.gz
          retention-days: 90
