name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vid-fetch-hub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          # Use git tag if available, otherwise derive from date
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          # On tag push, use that tag; on branch push, increment patch
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${TAG#v}"
          else
            # Split and increment patch
            IFS='.' read -r MAJOR MINOR PATCH <<< "${TAG#v}"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build and push multi-arch images
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact filename
        id: artifact_name
        run: |
          echo "name=vid-fetch-hub-v${{ steps.version.outputs.version }}-x86.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Save x86 image as artifact
        run: |
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }} --platform linux/amd64
          docker save ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }} | gzip > /tmp/${{ steps.artifact_name.outputs.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: /tmp/${{ steps.artifact_name.outputs.name }}
          retention-days: 90
